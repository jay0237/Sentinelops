name: SentinelOps CI

on:
  push:
   branches: [ main ]

   pull_request:
      branches: [ main ]

    
jobs:
    build: 
        runs-on: ubuntu-latest

        steps:
         
         - name: Checkout Repository
            uses: actions/checkout@4
            
          -name: Set up Python
            uses: actions/setup-python@v5
            with:
                python-version: '3.9'