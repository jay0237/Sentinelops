services:

  backend:
    build: .
    container_name: sentinelops-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - .:/app

    depends_on:
      - db

    restart: always

  db:
    image: postgres:15
    container_name: sentinelops-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sentinelops

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

  prometheus:
    image: prom/prometheus
    container_name: sentinelops-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

    restart: always

  grafana:
    image: grafana/grafana
    container_name: sentinelops-grafana

    ports:
      - "3000:3000"

    restart: always

volumes:
  postgres_data: